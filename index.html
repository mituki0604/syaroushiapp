<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="走魂">
  <title>走魂 〜Sprint Eikan〜</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #2d2d44;
      --border: #8b7355;
      --text: #f0e6d2;
      --text-dim: #a89878;
      --accent: #e94560;
      --accent2: #f5c518;
      --ok: #52c41a;
      --ng: #ff4444;
    }
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      font-family: 'DotGothic16', sans-serif;
      background-color: #000;
      color: var(--text);
      margin: 0; padding: 0;
      display: flex;
      justify-content: center;
    }
    #app {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      background-color: var(--bg);
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 10px;
    }
    .screen.active {
      display: flex;
    }
    /* UI Components */
    .panel {
      background: var(--panel);
      border: 4px solid var(--border);
      padding: 10px;
      margin-bottom: 10px;
    }
    h1, h2, h3 { margin: 0 0 10px 0; text-align: center; }
    button {
      font-family: 'DotGothic16', sans-serif;
      background: var(--panel);
      color: var(--text);
      border: 4px solid var(--border);
      padding: 10px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-bottom: 10px;
      transition: 0.1s;
    }
    button:active { transform: scale(0.98); }
    button:hover { border-color: var(--accent2); }
    button:disabled { opacity: 0.5; border-color: var(--border); pointer-events: none; }
    
    .row { display: flex; justify-content: space-between; align-items: center; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .text-center { text-align: center; }
    .text-accent { color: var(--accent2); }
    .text-ok { color: var(--ok); }
    .text-ng { color: var(--ng); }
    .text-dim { color: var(--text-dim); }

    /* Custom Parts */
    .header-info { border-bottom: 4px dashed var(--border); padding-bottom: 5px; margin-bottom: 10px; font-size: 14px;}
    .member-list { flex: 1; overflow-y: auto; }
    .member-card {
      border: 2px solid var(--border);
      background: #232336;
      padding: 8px;
      margin-bottom: 5px;
      cursor: pointer;
    }
    .member-card:hover { border-color: var(--accent2); }
    .member-card.injured { border-color: var(--ng); background: #3a1c1c; }
    .bar-bg { background: #111; height: 10px; width: 100%; border: 2px solid var(--border); margin: 2px 0; }
    .bar-fg { background: var(--ok); height: 100%; }
    
    #modal-overlay {
      position: absolute; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.8);
      display: none; justify-content: center; align-items: center; z-index: 100;
      padding: 20px;
    }
    #modal-content {
      background: var(--panel); border: 4px solid var(--border);
      padding: 20px; width: 100%; text-align: center;
    }
    .race-anim-text { font-size: 24px; color: var(--accent2); height: 50px; }
    
    .nav-bottom {
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-top: auto;
    }
    .nav-bottom button { padding: 5px; font-size: 14px; margin-bottom: 0; }
    .action-btn { background: var(--accent); color: #fff; border-color: #fff; font-size: 18px; margin-top: 10px;}
    .action-btn:hover { border-color: var(--accent2); }
  </style>
</head>
<body>
<div id="app">

  <div id="screen-title" class="screen active">
    <div class="panel" style="margin-top: 40vh; transform: translateY(-50%);">
      <h1 class="text-accent" style="font-size: 32px;">走魂</h1>
      <h2 style="margin-bottom: 30px;">〜Sprint Eikan〜</h2>
      <button data-action="newGame">▶ はじめから</button>
      <button id="btn-load" data-action="loadGame">📂 つづきから</button>
    </div>
  </div>

  <div id="screen-home" class="screen">
    <div class="header-info" id="home-header"></div>
    <div class="panel member-list" id="home-members"></div>
    <button class="action-btn" data-action="nextTurn">▶ 次のターンへ</button>
    <div class="nav-bottom">
      <button data-action="nav" data-to="practice">⚡練習</button>
      <button data-action="nav" data-to="records">🏆戦績</button>
      <button data-action="systemSave">💾保存</button>
      <button data-action="nav" data-to="title">🚪戻る</button>
    </div>
  </div>

  <div id="screen-practice" class="screen">
    <div class="panel">
      <h3>全体練習メニュー</h3>
      <div class="grid-3" id="practice-menu"></div>
      <p class="text-dim text-center" id="practice-desc" style="font-size:12px; margin:5px 0;">効果と疲労度が表示されます</p>
    </div>
    <div class="panel" id="practice-ace-panel">
      <h3>エース個別指示</h3>
      <div id="practice-ace-info" class="text-center" style="margin-bottom:10px;">エース未指名</div>
      <div class="grid-3">
        <button class="ace-menu-btn" data-menu="special">特訓</button>
        <button class="ace-menu-btn" data-menu="rest">休養</button>
        <button class="ace-menu-btn" data-menu="self">自主練</button>
      </div>
    </div>
    <div style="flex:1;"></div>
    <button class="action-btn" data-action="nav" data-to="home">決定して戻る</button>
  </div>

  <div id="screen-player" class="screen">
    <div class="panel" id="player-detail-content"></div>
    <div class="grid-2">
      <button data-action="toggleAce" id="btn-toggle-ace">エース指名</button>
      <button data-action="nav" data-to="home">戻る</button>
    </div>
  </div>

  <div id="screen-race-entry" class="screen">
    <div class="panel">
      <h2 class="text-accent" id="race-title">大会エントリー</h2>
      <p>出場する選手を最大3名選んでください。</p>
      <div id="race-entry-list" class="member-list" style="max-height: 40vh; overflow-y:auto; border:2px solid var(--border); padding:5px;"></div>
      <div style="margin-top:10px;">選択中: <span id="race-entry-count">0</span> / 3</div>
    </div>
    <button class="action-btn" id="btn-start-race" data-action="startRace" disabled>出走する！</button>
  </div>

  <div id="screen-race-view" class="screen">
    <div class="panel" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
      <h2 id="race-view-title">レース本番</h2>
      <div id="race-anim-container" class="race-anim-text"></div>
      <div id="race-result-list" style="width:100%; display:none; margin-top:20px; text-align:left;"></div>
    </div>
    <button id="btn-race-ok" class="action-btn" data-action="finishRace" style="display:none;">確認</button>
  </div>

  <div id="screen-records" class="screen">
    <div class="panel" style="flex:1; overflow-y:auto;">
      <h2>殿堂入り (歴代PB)</h2>
      <div id="records-list"></div>
    </div>
    <button class="action-btn" data-action="nav" data-to="home">戻る</button>
  </div>

  <div id="modal-overlay">
    <div id="modal-content">
      <h3 id="modal-title"></h3>
      <p id="modal-text"></p>
      <button data-action="closeModal">OK</button>
    </div>
  </div>

</div>

<script>
// --- ゲームデータ・定数 ---
const SAVE_KEY = 'sprint-eikan-save-v1';

const NAMES_LAST = ["佐藤","鈴木","高橋","田中","伊藤","渡辺","山本","中村","小林","加藤","吉田","山田","清水","佐々木","山口","松本","井上","木村","林","斎藤"];
const NAMES_FIRST = ["陸","翔","健太","大樹","蓮","陽翔","颯太","拓海","翼","達也","悠真","湊","蒼空","大和","樹","結弦","歩夢","涼太","大輔","直樹"];

const TALENTS = [
  { rank: 'F', mult: 0.5, prob: 40 },
  { rank: 'E', mult: 0.7, prob: 30 },
  { rank: 'D', mult: 0.85, prob: 15 },
  { rank: 'C', mult: 1.0, prob: 8 },
  { rank: 'B', mult: 1.15, prob: 4 },
  { rank: 'A', mult: 1.3, prob: 2 },
  { rank: 'S', mult: 1.5, prob: 0.8 },
  { rank: 'SS', mult: 1.8, prob: 0.2 }
];

const PERSONALITIES = ['負けず嫌い','マイペース','努力家','天才肌','内気','ムードメーカー'];

const PRACTICE_MENUS = {
  start: { name: 'スタート練', stat: 'start', val: 2, fat: 10 },
  sprint: { name: 'スプリント', stat: 'topSpeed', val: 2, fat: 15 },
  endurance: { name: '200m走', stat: 'stamina', val: 2, fat: 20 },
  drill: { name: 'ドリル', stat: 'form', val: 2, fat: 5 },
  race: { name: '模擬レース', stat: 'all', val: 1, fat: 25 }, // mental+2, all+1
  rest: { name: '休養', stat: 'rest', val: 0, fat: 0 }
};

const RACE_SCHEDULE = {
  8: { name: '春季大会(地区)', type: 'normal' },
  15: { name: '県総体', type: 'hard' },
  23: { name: '新人戦', type: 'rookie' } // 1,2年のみ
};

// --- ステート ---
let state = {};

function getInitialState() {
  return {
    year: 1,
    turn: 1,
    schoolName: '陸桜高校',
    members: [],
    hallOfFame: [],
    aceId: null,
    practiceMenu: 'rest',
    aceMenu: null,
    nextId: 1,
    raceEntries: []
  };
}

// --- ユーティリティ ---
const $ = id => document.getElementById(id);
const rand = (min, max) => Math.random() * (max - min) + min;
const randInt = (min, max) => Math.floor(rand(min, max + 1));
const pickRandom = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

function getTalent() {
  let r = Math.random() * 100;
  let sum = 0;
  for (let t of TALENTS) {
    sum += t.prob;
    if (r <= sum) return t;
  }
  return TALENTS[0];
}

// --- コアロジック ---
function generatePlayer(grade) {
  const t = getTalent();
  const base = grade === 1 ? 15 : grade === 2 ? 30 : 45;
  const p = {
    id: state.nextId++,
    name: pickRandom(NAMES_LAST) + " " + pickRandom(NAMES_FIRST),
    grade: grade,
    talentRank: t.rank,
    talentMult: t.mult,
    personality: pickRandom(PERSONALITIES),
    stats: {
      start: clamp(base + rand(0, 15)*t.mult, 0, 100),
      topSpeed: clamp(base + rand(0, 15)*t.mult, 0, 100),
      stamina: clamp(base + rand(0, 15)*t.mult, 0, 100),
      form: clamp(base + rand(0, 15)*t.mult, 0, 100),
      mental: clamp(base + rand(0, 15)*t.mult, 0, 100)
    },
    fatigue: 0,
    motivation: randInt(40, 80),
    injured: 0,
    pb: 99.99,
    seasonBest: 99.99,
    isAce: false
  };
  p.pb = calcTime(p.stats, p.stats.mental, 0, false);
  p.seasonBest = p.pb;
  return p;
}

function calcTime(stats, mental, fatigue, isRace) {
  let base = 13.5;
  base -= 0.5 * (stats.start / 100);
  base -= 1.2 * (stats.topSpeed / 100);
  base -= 0.6 * (stats.stamina / 100);
  base *= 1 - (stats.form / 2500); 
  
  if (isRace) {
    const clutch = 0.7 + (mental / 100) * 0.3;
    base = 13.5 - (13.5 - base) * clutch;
  }
  base += fatigue / 300;
  base += (Math.random() - 0.5) * 0.3;
  return Math.max(9.8, base);
}

// --- システム ---
function save() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem(SAVE_KEY);
    if(d) { state = JSON.parse(d); return true; }
  } catch(e){}
  return false;
}

function showModal(title, text) {
  $('modal-title').innerText = title;
  $('modal-text').innerHTML = text;
  $('modal-overlay').style.display = 'flex';
}

function hideModal() {
  $('modal-overlay').style.display = 'none';
}

function switchScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(screenId).classList.add('active');
  
  if(screenId === 'screen-home') renderHome();
  if(screenId === 'screen-practice') renderPractice();
  if(screenId === 'screen-records') renderRecords();
  
  window.scrollTo(0, 0);
}

// --- 初期化 ---
function initNewGame() {
  state = getInitialState();
  // 初期メンバー生成 (各学年4名)
  for(let g=1; g<=3; g++) {
    for(let i=0; i<4; i++) state.members.push(generatePlayer(g));
  }
  switchScreen('screen-home');
  save();
}

// --- 描画系 ---
function renderHome() {
  const t = state.turn;
  const month = Math.floor(((t - 1) % 48) / 4) + 4;
  const displayMonth = month > 12 ? month - 12 : month;
  const week = ((t - 1) % 4) + 1;
  
  let nextRaceTurn = Object.keys(RACE_SCHEDULE).map(Number).find(rt => rt >= ((t-1)%48)+1);
  let nextRaceStr = nextRaceTurn ? `次大会: ${nextRaceTurn - (((t-1)%48)+1)}週後` : "次大会: 来年";

  $('home-header').innerHTML = `
    <div class="row"><span>${state.schoolName} ${state.year}年目</span><span class="text-accent">${displayMonth}月 第${week}週</span></div>
    <div class="row text-dim"><span>T: ${t} / 48</span><span>${nextRaceStr}</span></div>
  `;

  let html = '';
  state.members.sort((a,b)=>b.grade - a.grade).forEach(m => {
    let status = m.injured > 0 ? `<span class="text-ng">怪我(${m.injured}週)</span>` : `疲労: ${m.fatigue|0}`;
    let ace = m.isAce ? '<span class="text-accent2">👑</span>' : '';
    let cl = m.injured > 0 ? 'injured' : '';
    html += `
      <div class="member-card ${cl}" data-action="viewPlayer" data-id="${m.id}">
        <div class="row">
          <span><b>[${m.grade}年]</b> ${m.name} ${ace}</span>
          <span class="text-accent2">${m.talentRank}</span>
        </div>
        <div class="row" style="font-size:12px; margin-top:4px;">
          <span>PB: <span class="text-ok">${m.pb.toFixed(2)}s</span></span>
          <span class="text-dim">${status}</span>
        </div>
      </div>
    `;
  });
  $('home-members').innerHTML = html;
}

function renderPractice() {
  let html = '';
  for(let k in PRACTICE_MENUS) {
    let pm = PRACTICE_MENUS[k];
    let sel = state.practiceMenu === k ? 'border-color:var(--accent2); background:#443;' : '';
    html += `<button style="${sel}" data-action="selectMenu" data-menu="${k}">${pm.name}</button>`;
  }
  $('practice-menu').innerHTML = html;
  
  if(state.aceId) {
    let ace = state.members.find(m => m.id === state.aceId);
    $('practice-ace-info').innerHTML = `👑 ${ace.name} [現在: ${state.aceMenu ? state.aceMenu : 'なし'}]`;
    document.querySelectorAll('.ace-menu-btn').forEach(b => {
      b.style.borderColor = state.aceMenu === b.dataset.menu ? 'var(--accent2)' : 'var(--border)';
    });
    $('practice-ace-panel').style.display = 'block';
  } else {
    $('practice-ace-panel').style.display = 'none';
  }
}

function showPlayer(id) {
  let m = state.members.find(x => x.id === id);
  if(!m) return;
  state.viewingPlayerId = id;
  
  const drawBar = (val) => `<div class="bar-bg"><div class="bar-fg" style="width:${val}%"></div></div>`;
  
  $('player-detail-content').innerHTML = `
    <h2 class="text-accent">${m.name} [${m.grade}年] ${m.isAce?'👑':''}</h2>
    <div class="grid-2 text-dim text-center" style="margin-bottom:10px;">
      <div>才能: <span class="text-accent2">${m.talentRank}</span></div>
      <div>性格: ${m.personality}</div>
    </div>
    <div class="grid-2 text-center" style="margin-bottom:10px;">
      <div>PB: <span class="text-ok">${m.pb.toFixed(2)}</span>s</div>
      <div>今季: ${m.seasonBest.toFixed(2)}s</div>
    </div>
    <hr style="border:1px dashed var(--border); margin:10px 0;">
    <div>スタート ${m.stats.start|0} ${drawBar(m.stats.start)}</div>
    <div>トップS ${m.stats.topSpeed|0} ${drawBar(m.stats.topSpeed)}</div>
    <div>スタミナ ${m.stats.stamina|0} ${drawBar(m.stats.stamina)}</div>
    <div>フォーム ${m.stats.form|0} ${drawBar(m.stats.form)}</div>
    <div>メンタル ${m.stats.mental|0} ${drawBar(m.stats.mental)}</div>
    <hr style="border:1px dashed var(--border); margin:10px 0;">
    <div class="row">
      <span>疲労: ${m.fatigue|0}/100</span>
      <span>モチベ: ${m.motivation|0}/100</span>
    </div>
  `;
  $('btn-toggle-ace').innerText = m.isAce ? 'エース指名解除' : 'エースに指名';
  $('btn-toggle-ace').disabled = m.injured > 0;
  
  switchScreen('screen-player');
}

function renderRecords() {
  let html = '';
  let sorted = [...state.hallOfFame].sort((a,b)=>a.pb - b.pb);
  if(sorted.length === 0) html = '<p class="text-dim">まだ記録がありません</p>';
  sorted.forEach((r, i) => {
    let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `${i+1}位`;
    html += `<div class="member-card row"><span>${rankStr} ${r.name}(${r.year}年度卒)</span><span class="text-ok">${r.pb.toFixed(2)}s</span></div>`;
  });
  $('records-list').innerHTML = html;
}

// --- ターン進行ロジック ---
function processTurn() {
  let events = [];
  
  // 1. 練習実行
  const menu = PRACTICE_MENUS[state.practiceMenu];
  state.members.forEach(m => {
    if (m.injured > 0) {
      m.injured--;
      m.fatigue = clamp(m.fatigue - 20, 0, 100);
      if(m.injured === 0) events.push(`${m.name}の怪我が治った！`);
      return; // 怪我人は練習不参加
    }
    
    // モチベ倍率
    let motMult = m.motivation < 30 ? 0.7 : m.motivation <= 60 ? 1.0 : m.motivation <= 80 ? 1.15 : 1.3;
    let effect = 0;
    
    if (menu.stat === 'rest') {
      m.fatigue = clamp(m.fatigue - 40, 0, 100);
      m.motivation = clamp(m.motivation + 5, 0, 100);
    } else {
      effect = menu.val * m.talentMult * motMult * (1 - m.fatigue/100);
      if (menu.stat === 'all') {
        for(let s in m.stats) m.stats[s] = clamp(m.stats[s] + effect, 0, 100);
        m.stats.mental = clamp(m.stats.mental + effect, 0, 100);
      } else {
        m.stats[menu.stat] = clamp(m.stats[menu.stat] + effect, 0, 100);
      }
      m.fatigue = clamp(m.fatigue + menu.fat, 0, 100);
    }
    
    // エース特別処理
    if (m.isAce && state.aceMenu) {
      if(state.aceMenu === 'special') {
        m.stats.topSpeed = clamp(m.stats.topSpeed + 3, 0, 100);
        m.fatigue = clamp(m.fatigue + 15, 0, 100);
      } else if (state.aceMenu === 'rest') {
        m.fatigue = clamp(m.fatigue - 50, 0, 100);
        m.motivation = clamp(m.motivation + 3, 0, 100);
      } else if (state.aceMenu === 'self') {
        let keys = Object.keys(m.stats);
        let trg = pickRandom(keys);
        m.stats[trg] = clamp(m.stats[trg] + rand(1,5), 0, 100);
        m.fatigue = clamp(m.fatigue + 10, 0, 100);
      }
    }

    // 2. 怪我判定
    if (m.fatigue > 70 && Math.random() < (m.fatigue - 70)/100) {
      m.injured = randInt(2, 6);
      m.motivation = clamp(m.motivation - 20, 0, 100);
      events.push(`<span class="text-ng">${m.name}が怪我をしました(${m.injured}週離脱)</span>`);
      if(m.isAce) m.isAce = false; // エース剥奪
    }
    
    // 3. ランダムイベント (10%)
    if (Math.random() < 0.1 && m.injured === 0) {
      let r = Math.random();
      if(r < 0.2) { m.stats.topSpeed = clamp(m.stats.topSpeed+10,0,100); events.push(`${m.name}が覚醒！スピードUP!`); }
      else if(r < 0.4) { m.stats.mental = clamp(m.stats.mental-5,0,100); m.motivation-=10; events.push(`${m.name}がスランプ気味...`); }
      else if(r < 0.6) { m.stats.form = clamp(m.stats.form-5,0,100); events.push(`${m.name}のフォームが崩れた`); }
      else if(r < 0.8 && m.grade === 1) { 
        let tIdx = TALENTS.findIndex(x=>x.rank===m.talentRank);
        if(tIdx < TALENTS.length-1) {
          m.talentRank = TALENTS[tIdx+1].rank; m.talentMult = TALENTS[tIdx+1].mult;
          events.push(`<span class="text-accent2">${m.name}の才能が開花した！(${m.talentRank})</span>`);
        }
      } else {
        m.motivation = clamp(m.motivation+5, 0, 100);
      }
    }
  });

  state.turn++;
  
  // 年度末処理
  if ((state.turn - 1) % 48 === 0 && state.turn > 1) {
    events.push("🌸 3年生が卒業しました");
    state.members.forEach(m => {
      if(m.grade === 3) {
        state.hallOfFame.push({ name: m.name, pb: m.pb, year: state.year });
      }
    });
    state.members = state.members.filter(m => m.grade < 3);
    state.members.forEach(m => { m.grade++; m.seasonBest = 99.99; });
    for(let i=0; i<4; i++) state.members.push(generatePlayer(1));
    events.push("🌸 新1年生が4名入部しました");
    state.year++;
    state.aceId = null;
  }

  save();
  
  if(events.length > 0) {
    showModal("イベント発生", events.join("<br><br>"));
  }

  // 大会チェック
  let relTurn = ((state.turn - 1) % 48) + 1;
  if(RACE_SCHEDULE[relTurn]) {
    prepareRace(relTurn);
  } else {
    renderHome();
  }
}

// --- 大会システム ---
function prepareRace(relTurn) {
  state.currentRace = RACE_SCHEDULE[relTurn];
  state.raceEntries = [];
  $('race-title').innerText = state.currentRace.name;
  
  let html = '';
  state.members.forEach(m => {
    if(m.injured > 0) return;
    if(state.currentRace.type === 'rookie' && m.grade === 3) return; // 新人戦制限
    html += `
      <div class="member-card row race-entry-card" data-action="toggleEntry" data-id="${m.id}">
        <span>[${m.grade}] ${m.name}</span>
        <span>PB: ${m.pb.toFixed(2)}s</span>
      </div>`;
  });
  if(html==='') html = '<p class="text-ng">出場可能な選手がいません</p>';
  $('race-entry-list').innerHTML = html;
  $('race-entry-count').innerText = 0;
  $('btn-start-race').disabled = true;
  switchScreen('screen-race-entry');
}

function updateEntryCount() {
  let count = state.raceEntries.length;
  $('race-entry-count').innerText = count;
  $('btn-start-race').disabled = count === 0;
  document.querySelectorAll('.race-entry-card').forEach(el => {
    let id = parseInt(el.dataset.id);
    if(state.raceEntries.includes(id)) {
      el.style.borderColor = 'var(--accent2)';
      el.style.background = '#443';
    } else {
      el.style.borderColor = 'var(--border)';
      el.style.background = '#232336';
    }
  });
}

function executeRace() {
  switchScreen('screen-race-view');
  $('race-anim-container').style.display = 'block';
  $('race-result-list').style.display = 'none';
  $('btn-race-ok').style.display = 'none';
  
  // ライバル生成
  let rivals = [];
  let baseStat = state.currentRace.type === 'hard' ? 60 : state.currentRace.type === 'normal' ? 40 : 30;
  for(let i=0; i<5; i++) {
    rivals.push({
      name: `ライバル${i+1}`,
      isPlayer: false,
      time: calcTime({start:baseStat, topSpeed:baseStat, stamina:baseStat, form:baseStat}, 50, 0, true)
    });
  }
  
  let results = [];
  state.raceEntries.forEach(id => {
    let m = state.members.find(x=>x.id===id);
    let t = calcTime(m.stats, m.stats.mental, m.fatigue, true);
    results.push({ name: m.name, isPlayer: true, time: t, member: m });
    m.fatigue = clamp(m.fatigue + 20, 0, 100); // レース疲労
  });
  
  results = results.concat(rivals).sort((a,b)=>a.time - b.time);
  
  playRaceAnimation(results);
}

async function playRaceAnimation(results) {
  const textEl = $('race-anim-container');
  const delay = ms => new Promise(r => setTimeout(r, ms));
  
  textEl.innerText = 'On your marks...'; await delay(1000);
  textEl.innerText = 'Set...'; await delay(1000);
  textEl.style.fontSize = '40px'; textEl.style.color = '#fff';
  textEl.innerText = 'BANG!!'; await delay(600);
  textEl.style.fontSize = '24px'; textEl.style.color = 'var(--accent2)';
  textEl.innerText = '30m...'; await delay(800);
  textEl.innerText = '60m...'; await delay(800);
  textEl.innerText = 'GOAL!!'; await delay(1000);
  
  textEl.style.display = 'none';
  
  let html = '';
  let msg = [];
  results.forEach((r, i) => {
    let rank = i+1;
    let cl = r.isPlayer ? 'text-accent2' : 'text-dim';
    let pbStr = '';
    if(r.isPlayer) {
      if(r.time < r.member.pb) {
        r.member.pb = r.time;
        pbStr = ' <span class="text-ok">★PB!</span>';
      }
      if(r.time < r.member.seasonBest) r.member.seasonBest = r.time;
      
      if(rank <= 3) {
        r.member.motivation = clamp(r.member.motivation + 20, 0, 100);
        msg.push(`${r.name}が${rank}位入賞！モチベUP!`);
      } else {
        r.member.motivation = clamp(r.member.motivation - 10, 0, 100);
      }
    }
    html += `<div class="row" style="border-bottom:1px solid var(--border); padding:5px 0;">
      <span class="${cl}">${rank}位 ${r.name}</span>
      <span class="${cl}">${r.time.toFixed(2)}s ${pbStr}</span>
    </div>`;
  });
  
  $('race-result-list').innerHTML = html;
  $('race-result-list').style.display = 'block';
  $('btn-race-ok').style.display = 'block';
  save();
  
  if(msg.length > 0) setTimeout(() => showModal("大会結果", msg.join("<br>")), 500);
}


// --- イベントリスナー (デリゲーション) ---
$('app').addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if(!target) return;
  const action = target.dataset.action;
  
  if(action === 'newGame') {
    initNewGame();
  }
  else if(action === 'loadGame') {
    if(load()) switchScreen('screen-home');
  }
  else if(action === 'nav') {
    switchScreen('screen-' + target.dataset.to);
  }
  else if(action === 'viewPlayer') {
    showPlayer(parseInt(target.dataset.id));
  }
  else if(action === 'toggleAce') {
    let id = state.viewingPlayerId;
    let m = state.members.find(x=>x.id===id);
    if(m.isAce) {
      m.isAce = false; state.aceId = null;
    } else {
      state.members.forEach(x=>x.isAce = false);
      m.isAce = true; state.aceId = id;
    }
    showPlayer(id);
    save();
  }
  else if(action === 'selectMenu') {
    state.practiceMenu = target.dataset.menu;
    renderPractice();
  }
  else if(action === 'nextTurn') {
    processTurn();
  }
  else if(action === 'closeModal') {
    hideModal();
  }
  else if(action === 'toggleEntry') {
    let id = parseInt(target.dataset.id);
    let idx = state.raceEntries.indexOf(id);
    if(idx >= 0) {
      state.raceEntries.splice(idx, 1);
    } else {
      if(state.raceEntries.length < 3) state.raceEntries.push(id);
    }
    updateEntryCount();
  }
  else if(action === 'startRace') {
    executeRace();
  }
  else if(action === 'finishRace') {
    renderHome();
    switchScreen('screen-home');
  }
  else if(action === 'systemSave') {
    save();
    showModal('保存', 'セーブしました。');
  }
});

// エースメニュー選択の個別ハンドラ
$('app').addEventListener('click', (e) => {
  if(e.target.classList.contains('ace-menu-btn')) {
    state.aceMenu = e.target.dataset.menu;
    renderPractice();
  }
});

// 起動時
if(localStorage.getItem(SAVE_KEY)) {
  $('btn-load').disabled = false;
} else {
  $('btn-load').disabled = true;
}

</script>
