<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="社労士過去問">
<meta name="theme-color" content="#1a1613">
<title>社労士過去問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f5f1ea; --bg-deep: #ebe4d6; --ink: #1a1613; --ink-soft: #5a5047; --ink-faint: #8a7d6f;
  --line: #d9cfbd; --paper: #faf6ef; --accent: #8b2e2e; --accent-soft: #a84242;
  --correct: #3d6e4a; --wrong: #8b2e2e; --gold: #b8935a; --pin: #c9a961; --flag: #c9772e;
}
html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
body {
  font-family: 'Zen Kaku Gothic New', sans-serif; background: var(--bg); color: var(--ink);
  font-size: 15px; line-height: 1.7;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-font-smoothing: antialiased; letter-spacing: 0.02em;
}
.mincho { font-family: 'Shippori Mincho', serif; }
#app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; position: relative; }
.screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

header { padding: 16px 22px 12px; border-bottom: 1px solid var(--line); background: var(--bg); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
header .title { font-family: 'Shippori Mincho', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.1em; }
header .title::before { content: "◆ "; color: var(--accent); font-size: 0.8em; }
header .subtitle { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.25em; margin-top: 2px; }

.home-content { flex: 1; overflow-y: auto; padding: 20px 22px 40px; -webkit-overflow-scrolling: touch; }
.hero { text-align: center; padding: 14px 0 22px; border-bottom: 1px solid var(--line); margin-bottom: 18px; position: relative; }
.hero::after { content: ""; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--accent); }
.hero-kanji { font-family: 'Shippori Mincho', serif; font-size: 36px; font-weight: 700; letter-spacing: 0.18em; color: var(--ink); margin-bottom: 4px; }
.hero-sub { font-size: 10px; letter-spacing: 0.4em; color: var(--ink-faint); }

.year-tabs { display: flex; gap: 6px; margin-bottom: 16px; padding: 3px; background: var(--paper); border: 1px solid var(--line); }
.year-tab { flex: 1; padding: 8px; background: transparent; border: none; font-family: 'Shippori Mincho', serif; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; color: var(--ink-soft); }
.year-tab.active { background: var(--ink); color: var(--bg); }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); margin-bottom: 20px; border: 1px solid var(--line); background: var(--paper); }
.stat { padding: 11px 4px; text-align: center; border-right: 1px solid var(--line); }
.stat:last-child { border-right: none; }
.stat-num { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 600; color: var(--ink); line-height: 1; margin-bottom: 3px; }
.stat-label { font-size: 9px; letter-spacing: 0.1em; color: var(--ink-faint); }

.section-label { font-size: 11px; letter-spacing: 0.3em; color: var(--ink-faint); margin-bottom: 10px; padding-left: 8px; border-left: 2px solid var(--accent); display: flex; align-items: center; justify-content: space-between; }
.section-label .hint { font-size: 9px; color: var(--ink-faint); letter-spacing: 0.1em; }

.mode-tabs { display: flex; background: var(--paper); border: 1px solid var(--line); margin-bottom: 18px; padding: 3px; gap: 2px; }
.mode-tab { flex: 1; padding: 10px 4px; background: transparent; border: none; font-family: 'Shippori Mincho', serif; font-size: 12.5px; letter-spacing: 0.08em; cursor: pointer; color: var(--ink-soft); }
.mode-tab.active { background: var(--ink); color: var(--bg); }
.mode-tab .tab-sub { display: block; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 8.5px; letter-spacing: 0.15em; margin-top: 2px; opacity: 0.7; }
.mode-panel { display: none; }
.mode-panel.active { display: block; }

.subject-list { display: flex; flex-direction: column; gap: 1px; background: var(--line); border: 1px solid var(--line); margin-bottom: 20px; }
.subject-item { background: var(--paper); padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.15s; }
.subject-item:active { background: var(--bg-deep); }
.subject-item.disabled { opacity: 0.45; cursor: not-allowed; }
.subject-item.disabled:active { background: var(--paper); }
.subject-name { font-family: 'Shippori Mincho', serif; font-size: 14.5px; font-weight: 500; }
.subject-meta { display: flex; align-items: center; gap: 9px; }
.subject-count { font-size: 11px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.subject-progress { width: 40px; height: 3px; background: var(--bg-deep); position: relative; }
.subject-progress::after { content: ""; position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); width: var(--p, 0%); }
.chevron { color: var(--ink-faint); font-size: 14px; }
.badge-soon { font-size: 9px; letter-spacing: 0.1em; color: var(--ink-faint); border: 1px solid var(--line); padding: 2px 6px; background: var(--bg-deep); }
.badge-best { font-size: 10px; letter-spacing: 0.05em; color: var(--accent); font-family: 'Shippori Mincho', serif; font-weight: 600; }

.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.mode-btn { background: var(--paper); border: 1px solid var(--line); padding: 14px 12px; text-align: left; cursor: pointer; font-family: inherit; color: inherit; transition: all 0.15s; }
.mode-btn:active { background: var(--bg-deep); transform: scale(0.98); }
.mode-icon { font-family: 'Shippori Mincho', serif; font-size: 19px; color: var(--accent); margin-bottom: 2px; display: block; }
.mode-title { font-size: 12.5px; font-weight: 500; margin-bottom: 2px; }
.mode-desc { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.05em; }

.exam-note { background: var(--paper); border: 1px solid var(--line); border-left: 3px solid var(--accent); padding: 11px 13px; font-size: 11.5px; line-height: 1.75; color: var(--ink-soft); margin-bottom: 16px; }
.exam-note .nt { font-family: 'Shippori Mincho', serif; color: var(--accent); font-size: 10.5px; letter-spacing: 0.2em; display: block; margin-bottom: 3px; }

/* Quiz 一問一答 */
.quiz-header { padding: 11px 18px; border-bottom: 1px solid var(--line); background: var(--bg); display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.quiz-back { background: none; border: none; font-size: 22px; color: var(--ink-soft); cursor: pointer; padding: 4px 8px; margin-left: -8px; line-height: 1; }
.progress-bar { flex: 1; height: 3px; background: var(--bg-deep); position: relative; overflow: hidden; }
.progress-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); transition: width 0.3s; }
.quiz-counter { font-family: 'Shippori Mincho', serif; font-size: 13px; color: var(--ink-soft); min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
.bookmark-btn, .flag-btn { background: none; border: none; font-size: 20px; color: var(--ink-faint); cursor: pointer; padding: 4px 6px; line-height: 1; transition: color 0.15s; }
.bookmark-btn.active { color: var(--pin); }
.flag-btn.active { color: var(--flag); }

.quiz-body { flex: 1; overflow-y: auto; padding: 16px 22px 130px; -webkit-overflow-scrolling: touch; }
.meta-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.tag { font-size: 10px; letter-spacing: 0.12em; padding: 3px 9px; border: 1px solid var(--line); color: var(--ink-soft); background: var(--paper); }
.tag.accent { border-color: var(--accent); color: var(--accent); }
.question-context { background: var(--paper); border: 1px solid var(--line); border-left: 3px solid var(--ink-faint); padding: 10px 14px; margin-bottom: 14px; font-size: 12.5px; color: var(--ink-soft); line-height: 1.75; }
.question-context-label { font-size: 10px; letter-spacing: 0.25em; color: var(--ink-faint); margin-bottom: 4px; }
.question-text { font-family: 'Shippori Mincho', serif; font-size: 16px; line-height: 1.9; margin-bottom: 20px; padding: 4px 0 18px; border-bottom: 1px dashed var(--line); letter-spacing: 0.03em; }
.question-text::before { content: "問"; display: inline-block; font-size: 12px; background: var(--ink); color: var(--bg); padding: 3px 8px; margin-right: 10px; vertical-align: middle; letter-spacing: 0; font-family: 'Zen Kaku Gothic New', sans-serif; }
.answer-area { display: flex; gap: 10px; margin-bottom: 18px; }
.answer-btn { flex: 1; padding: 20px 0; background: var(--paper); border: 1px solid var(--line); font-family: 'Shippori Mincho', serif; font-size: 26px; cursor: pointer; transition: all 0.15s; color: var(--ink); }
.answer-btn:active:not(:disabled) { transform: scale(0.97); background: var(--bg-deep); }
.answer-btn[data-value="true"] .sym { color: var(--correct); }
.answer-btn[data-value="false"] .sym { color: var(--wrong); }
.answer-btn .sym { display: block; font-size: 30px; line-height: 1; margin-bottom: 4px; }
.answer-btn .lbl { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.2em; }
.answer-btn.correct-choice { background: #eaf0ea; border-color: var(--correct); border-width: 2px; }
.answer-btn.wrong-choice { background: #f0e8e8; border-color: var(--wrong); border-width: 2px; }
.answer-btn:disabled { cursor: default; }
.answer-btn.correct-choice:disabled, .answer-btn.wrong-choice:disabled { opacity: 1; }

.result-panel { background: var(--paper); border: 1px solid var(--line); padding: 16px; margin-bottom: 14px; display: none; }
.result-panel.show { display: block; animation: slideUp 0.3s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.result-verdict { font-family: 'Shippori Mincho', serif; font-size: 17px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: baseline; gap: 10px; }
.result-verdict.ok { color: var(--correct); } .result-verdict.ng { color: var(--wrong); }
.result-verdict small { font-size: 10px; letter-spacing: 0.2em; color: var(--ink-faint); font-weight: 400; }
.result-answer { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.result-answer strong { font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--ink); }
.explanation-label { font-size: 10px; letter-spacing: 0.3em; color: var(--ink-faint); margin-bottom: 7px; }
.explanation { font-size: 13.5px; line-height: 1.85; color: var(--ink); margin-bottom: 12px; }
.reference { font-family: 'Shippori Mincho', serif; font-size: 12px; color: var(--accent); padding-top: 10px; border-top: 1px dashed var(--line); letter-spacing: 0.05em; }
.reference::before { content: "§ "; }

.next-btn, .submit-btn { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 44px); max-width: 476px; padding: 15px; background: var(--ink); color: var(--bg); border: none; font-family: 'Shippori Mincho', serif; font-size: 14px; letter-spacing: 0.25em; cursor: pointer; display: none; box-shadow: 0 4px 20px rgba(26, 22, 19, 0.15); }
.next-btn.show, .submit-btn.show { display: block; animation: slideUp 0.3s ease; }
.next-btn:active { background: var(--accent); }
.submit-btn { background: var(--accent); }
.submit-btn:active { background: var(--ink); }

/* Exam 試験モード */
.exam-header { padding: 10px 18px; border-bottom: 1px solid var(--line); background: var(--bg); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.exam-timer { font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: 0.1em; }
.exam-num-btn { background: var(--paper); border: 1px solid var(--line); padding: 5px 10px; font-size: 11px; letter-spacing: 0.1em; font-family: 'Shippori Mincho', serif; cursor: pointer; color: var(--ink-soft); }
.exam-num-btn:active { background: var(--bg-deep); }

.exam-body { flex: 1; overflow-y: auto; padding: 16px 22px 130px; -webkit-overflow-scrolling: touch; }
.exam-q-title { font-family: 'Shippori Mincho', serif; font-size: 14px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 6px; }
.exam-q-instruction { font-family: 'Shippori Mincho', serif; font-size: 15px; line-height: 1.85; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px dashed var(--line); letter-spacing: 0.03em; }

.choice-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.choice-item { background: var(--paper); border: 1px solid var(--line); padding: 13px 13px 13px 42px; cursor: pointer; font-family: 'Shippori Mincho', serif; font-size: 13.5px; line-height: 1.8; text-align: left; color: var(--ink); position: relative; letter-spacing: 0.02em; transition: all 0.12s; word-break: break-word; width: 100%; }
.choice-item:active { background: var(--bg-deep); }
.choice-item .choice-label { position: absolute; top: 13px; left: 13px; width: 21px; height: 21px; border: 1.5px solid var(--ink-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--ink-soft); transition: all 0.12s; }
.choice-item.selected { border-color: var(--ink); border-width: 2px; background: #fdfbf6; padding: 12px 12px 12px 41px; }
.choice-item.selected .choice-label { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.choice-item.correct-answer { border-color: var(--correct); border-width: 2px; padding: 12px 12px 12px 41px; background: #f0f5f0; }
.choice-item.correct-answer .choice-label { background: var(--correct); color: white; border-color: var(--correct); }
.choice-item.wrong-selected { border-color: var(--wrong); border-width: 2px; padding: 12px 12px 12px 41px; background: #f5eded; }
.choice-item.wrong-selected .choice-label { background: var(--wrong); color: white; border-color: var(--wrong); }
.choice-explain { font-size: 12px; color: var(--ink-soft); line-height: 1.75; margin-top: 10px; padding: 10px 12px; background: rgba(255,255,255,0.5); border-left: 2px solid var(--line); display: none; }
.choice-explain.show { display: block; }

.exam-nav { display: flex; gap: 8px; margin-top: 12px; }
.exam-nav-btn { flex: 1; padding: 11px; background: var(--paper); border: 1px solid var(--line); font-family: 'Shippori Mincho', serif; font-size: 13px; letter-spacing: 0.1em; cursor: pointer; color: var(--ink); }
.exam-nav-btn:active { background: var(--bg-deep); }
.exam-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.exam-nav-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* 選択式モード */
.sentaku-body { flex: 1; overflow-y: auto; padding: 16px 22px 130px; -webkit-overflow-scrolling: touch; }
.sentaku-text { font-family: 'Shippori Mincho', serif; font-size: 15px; line-height: 2.2; letter-spacing: 0.03em; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px dashed var(--line); }
.blank-slot {
  display: inline-block; min-width: 60px; padding: 2px 10px; margin: 0 2px;
  border: 1.5px solid var(--line); background: var(--paper);
  font-family: 'Shippori Mincho', serif; font-size: 13.5px; color: var(--ink-soft);
  cursor: pointer; position: relative; border-radius: 3px; transition: all 0.15s;
  text-align: center; vertical-align: middle;
}
.blank-slot.filled { background: #fdfbf6; color: var(--ink); border-color: var(--ink); border-width: 2px; padding: 1px 9px; }
.blank-slot.active { border-color: var(--accent); background: #fffbf6; box-shadow: 0 0 0 3px rgba(139, 46, 46, 0.15); }
.blank-slot.correct { border-color: var(--correct); background: #f0f5f0; color: var(--correct); }
.blank-slot.wrong { border-color: var(--wrong); background: #f5eded; color: var(--wrong); }
.blank-label { position: absolute; top: -14px; left: 0; font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; }

.sentaku-choices-wrap { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--line); padding: 10px 0; margin: 0 -22px; }
.sentaku-choices-label { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.2em; margin: 0 22px 8px; display: flex; justify-content: space-between; }
.sentaku-choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 0 22px; max-height: 220px; overflow-y: auto; }
.sentaku-choice { background: var(--paper); border: 1px solid var(--line); padding: 8px 10px 8px 28px; cursor: pointer; font-family: 'Shippori Mincho', serif; font-size: 12px; line-height: 1.5; text-align: left; color: var(--ink); position: relative; }
.sentaku-choice:active { background: var(--bg-deep); }
.sentaku-choice.used { opacity: 0.35; cursor: not-allowed; }
.sentaku-choice.correct-hint { border-color: var(--correct); background: #f0f5f0; }
.sentaku-choice .sc-num { position: absolute; top: 7px; left: 7px; width: 18px; height: 18px; border: 1px solid var(--ink-soft); border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; color: var(--ink-soft); }

/* Overview modal */
.overlay { position: fixed; inset: 0; background: rgba(26, 22, 19, 0.5); display: none; align-items: flex-end; z-index: 100; animation: fadeIn 0.2s ease; }
.overlay.show { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.sheet { background: var(--bg); width: 100%; max-width: 520px; margin: 0 auto; border-radius: 14px 14px 0 0; max-height: 82vh; display: flex; flex-direction: column; animation: slideUpSheet 0.25s ease; padding-bottom: env(safe-area-inset-bottom); }
@keyframes slideUpSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 40px; height: 4px; background: var(--line); border-radius: 2px; margin: 10px auto 4px; }
.sheet-header { padding: 14px 22px 10px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.sheet-title { font-family: 'Shippori Mincho', serif; font-size: 15px; letter-spacing: 0.1em; }
.sheet-close { background: none; border: none; font-size: 18px; color: var(--ink-soft); cursor: pointer; padding: 4px 8px; }
.sheet-body { flex: 1; overflow-y: auto; padding: 18px 22px; }
.q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 18px; }
.q-cell { aspect-ratio: 1; background: var(--paper); border: 1px solid var(--line); font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; color: var(--ink-soft); }
.q-cell:active { background: var(--bg-deep); }
.q-cell.answered { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.q-cell.current { outline: 2px solid var(--accent); outline-offset: -2px; }
.q-cell.flagged::after { content: "▲"; position: absolute; top: 2px; right: 3px; font-size: 7px; color: var(--flag); }
.legend { display: flex; gap: 14px; font-size: 10.5px; color: var(--ink-soft); flex-wrap: wrap; padding-top: 14px; border-top: 1px dashed var(--line); }
.legend span { display: flex; align-items: center; gap: 5px; }
.legend .dot { width: 10px; height: 10px; border: 1px solid var(--line); display: inline-block; }
.legend .dot.answered { background: var(--ink); border-color: var(--ink); }

/* Complete */
.complete-body { flex: 1; overflow-y: auto; padding: 26px 24px 40px; text-align: center; -webkit-overflow-scrolling: touch; }
#complete .complete-body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.complete-seal { width: 100px; height: 100px; border: 3px double var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-family: 'Shippori Mincho', serif; color: var(--accent); font-size: 28px; font-weight: 600; transform: rotate(-8deg); letter-spacing: 0.05em; }
.complete-title { font-family: 'Shippori Mincho', serif; font-size: 20px; margin-bottom: 4px; letter-spacing: 0.15em; }
.complete-score { font-family: 'Shippori Mincho', serif; font-size: 48px; font-weight: 600; color: var(--accent); margin: 12px 0 2px; line-height: 1; }
.complete-score small { font-size: 18px; color: var(--ink-faint); font-weight: 400; }
.complete-detail { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.2em; margin-bottom: 24px; }
.complete-time { font-family: 'Shippori Mincho', serif; font-size: 13px; color: var(--ink-soft); margin-bottom: 20px; letter-spacing: 0.1em; }

.result-table { background: var(--paper); border: 1px solid var(--line); margin: 0 0 22px; text-align: left; width: 100%; }
.result-row { display: grid; grid-template-columns: 52px 56px 1fr 32px; align-items: center; padding: 10px 13px; border-bottom: 1px solid var(--line); gap: 10px; font-size: 12px; }
.result-row:last-child { border-bottom: none; }
.result-row.header { background: var(--bg-deep); font-family: 'Shippori Mincho', serif; font-size: 10px; letter-spacing: 0.15em; color: var(--ink-faint); padding: 7px 13px; }
.result-row .rq { font-family: 'Shippori Mincho', serif; font-weight: 600; }
.result-row .rans { font-family: 'Shippori Mincho', serif; text-align: center; color: var(--ink-soft); font-size: 11.5px; }
.result-row .rcor { font-family: 'Shippori Mincho', serif; text-align: center; font-weight: 600; }
.result-row .rcor.ok { color: var(--correct); }
.result-row .rcor.ng { color: var(--wrong); }

let state = {
  history: {},
  bookmarks: [],
  examHistory: [],

};

let sentakuSession = null;

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getCurrentData() { return DATA[state.currentYear]; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  if (examTimerInterval) { clearInterval(examTimerInterval); examTimerInterval = null; }
  if (sentakuTimerInterval) { clearInterval(sentakuTimerInterval); sentakuTimerInterval = null; }
  showScreen('home');
  renderHome();
}

function getSubjectStats() {
  const stats = {};
  const data = getCurrentData();
  SUBJECTS.forEach(s => {
    stats[s.id] = { total: 0, solved: 0, correct: 0, examTotal: 0, sentakuTotal: 0 };
  });
  data.questions.forEach(q => {
    if (!stats[q.subject]) return;
    stats[q.subject].total++;
    const h = state.history[q.id];
    if (h) { stats[q.subject].solved++; if (h.correct) stats[q.subject].correct++; }
  });
  data.exams.forEach(e => { if (stats[e.subject]) stats[e.subject].examTotal++; });
  data.sentaku.forEach(s => { if (stats[s.subject]) stats[s.subject].sentakuTotal++; });
  return stats;
}

function getBestExamScore(subjectId) {
  const attempts = state.examHistory.filter(h => h.subjectId === subjectId && h.year === state.currentYear);
  if (attempts.length === 0) return null;
  return Math.max(...attempts.map(a => a.score));
}
function getBestSentakuScore(subjectId) {
  const attempts = state.sentakuHistory.filter(h => h.subjectId === subjectId && h.year === state.currentYear);
  if (attempts.length === 0) return null;
  return Math.max(...attempts.map(a => a.score));
}

                     <span class="chevron">›</span>`}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="mode-panel" id="panel-sentaku">
      <div class="exam-note">
        <span class="nt mincho">選択式について</span>
        文章中の空欄A〜Eを選択肢から埋める形式。空欄をタップして、下部の選択肢一覧から語句を選びます。全空欄埋め終わってから採点。各科目5空欄。
      </div>
      <div class="section-label">科目別選択式</div>
      <div class="subject-list">
        ${SUBJECTS.map(s => {
          const st = subjectStats[s.id];
          const isEmpty = st.sentakuTotal === 0;
          const best = getBestSentakuScore(s.id);
          return `
            <div class="subject-item ${isEmpty ? 'disabled' : ''}" ${isEmpty ? '' : `onclick="startSentaku('${s.id}')"`}>
              <div class="subject-name mincho">${s.name}</div>
              <div class="subject-meta">
                ${isEmpty ? '<span class="badge-soon">準備中</span>'
                  : `${best !== null ? `<span class="badge-best mincho">最高 ${best}/5</span>` : ''}
                     <span class="subject-count">5空欄</span>
                     <span class="chevron">›</span>`}
              </div>
            </div>
          `;
        }).join('')}
      </div>

  `;
  document.getElementById('homeContent').innerHTML = html;
}

function switchPanel(panelId, btn) {
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}
function switchYear(yearId) {
  state.currentYear = yearId;
  saveState();
  renderHome();
}

// =================================
// 一問一答
// =================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startSubject(subjectId) {
  const qs = getCurrentData().questions.filter(q => q.subject === subjectId);
  if (qs.length === 0) return;
  startQuiz(qs);
}

function startMode(mode) {
  const data = getCurrentData();
  let qs = [];
  if (mode === 'all') qs = shuffle(data.questions);
  else if (mode === 'wrong') {
    const wrongIds = Object.entries(state.history).filter(([_, h]) => !h.correct).map(([id]) => id);
    qs = data.questions.filter(q => wrongIds.includes(q.id));
    if (qs.length === 0) { alert('復習対象の問題はありません。'); return; }
    qs = shuffle(qs);
  } else if (mode === 'bookmark') {
    qs = data.questions.filter(q => state.bookmarks.includes(q.id));
    if (qs.length === 0) { alert('付箋のついた問題はありません。'); return; }
  } else if (mode === 'unsolved') {
    qs = data.questions.filter(q => !state.history[q.id]);
    if (qs.length === 0) { alert('未回答の問題はありません。'); return; }
    qs = shuffle(qs);
  }
  startQuiz(qs);
}

function startQuiz(qs) {
  session = { questions: qs, index: 0, correct: 0, answered: false, wrongIds: [] };
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = session.questions[session.index];
  session.answered = false;
  document.getElementById('counter').textContent = `${session.index + 1} / ${session.questions.length}`;
  document.getElementById('progressFill').style.width = `${(session.index / session.questions.length) * 100}%`;

  const bmBtn = document.getElementById('bookmarkBtn');
  if (state.bookmarks.includes(q.id)) { bmBtn.classList.add('active'); bmBtn.textContent = '★'; }
  else { bmBtn.classList.remove('active'); bmBtn.textContent = '☆'; }

  const body = document.getElementById('quizBody');
  body.innerHTML = `
    <div class="meta-row">
      <span class="tag accent">${q.subjectName}</span>
      <span class="tag">${q.year}・${q.qNumber} ${q.choice}</span>
    </div>
    ${q.context ? `<div class="question-context"><div class="question-context-label">前提</div>${q.context}</div>` : ''}
    <div class="question-text mincho">${q.question}</div>
    <div class="answer-area">
      <button class="answer-btn" data-value="true" onclick="answer(true)"><span class="sym mincho">○</span><span class="lbl">TADASHII</span></button>
      <button class="answer-btn" data-value="false" onclick="answer(false)"><span class="sym mincho">×</span><span class="lbl">AYAMARI</span></button>
    </div>
    <div class="result-panel" id="resultPanel">
      <div class="result-verdict" id="verdict"></div>
      <div class="result-answer" id="answerLine"></div>
      <div class="explanation-label">解説</div>
      <div class="explanation" id="explanation"></div>
      <div class="reference mincho" id="reference"></div>
    </div>
  `;
  document.getElementById('nextBtn').classList.remove('show');
  body.scrollTo(0, 0);
}

function toggleBookmark() {
  const q = session.questions[session.index];
  const idx = state.bookmarks.indexOf(q.id);
  if (idx >= 0) state.bookmarks.splice(idx, 1);
  else state.bookmarks.push(q.id);
  saveState();
  const bmBtn = document.getElementById('bookmarkBtn');
  if (state.bookmarks.includes(q.id)) { bmBtn.classList.add('active'); bmBtn.textContent = '★'; }
  else { bmBtn.classList.remove('active'); bmBtn.textContent = '☆'; }
}

function answer(userAnswer) {
  if (session.answered) return;
  session.answered = true;
  const q = session.questions[session.index];
  const correct = userAnswer === q.answer;
  if (correct) session.correct++;
  else session.wrongIds.push(q.id);
  state.history[q.id] = { correct, attempts: (state.history[q.id]?.attempts || 0) + 1, lastAt: Date.now() };
  saveState();

  document.querySelectorAll('#quiz .answer-btn').forEach(b => {
    b.disabled = true;
    const val = b.dataset.value === 'true';
    if (val === q.answer) b.classList.add('correct-choice');
    else if (val === userAnswer) b.classList.add('wrong-choice');
  });
  if (navigator.vibrate) navigator.vibrate(correct ? 20 : [30, 50, 30]);

  const verdict = document.getElementById('verdict');
  verdict.className = 'result-verdict ' + (correct ? 'ok' : 'ng');
  verdict.innerHTML = correct ? `正解 <small>CORRECT</small>` : `不正解 <small>INCORRECT</small>`;
  document.getElementById('answerLine').innerHTML = `正解は <strong>${q.answer ? '○ 正しい' : '× 誤り'}</strong>`;
  document.getElementById('explanation').textContent = q.explanation;
  document.getElementById('reference').textContent = q.reference;
  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent = session.index === session.questions.length - 1 ? '結果を見る' : '次の問題へ';
  document.getElementById('progressFill').style.width = `${((session.index + 1) / session.questions.length) * 100}%`;
}

function nextQuestion() {
  session.index++;
  if (session.index >= session.questions.length) showComplete();
  else renderQuestion();
}

function showComplete() {
  document.getElementById('finalScore').textContent = session.correct;
  document.getElementById('finalTotal').textContent = session.questions.length;
  const rate = Math.round((session.correct / session.questions.length) * 100);
  document.getElementById('finalRate').textContent = `正答率 ${rate}%`;
  const seal = document.getElementById('sealText');
  if (rate >= 80) { seal.textContent = '優秀'; seal.style.color = 'var(--correct)'; seal.style.borderColor = 'var(--correct)'; }
  else if (rate >= 60) { seal.textContent = '合格'; seal.style.color = 'var(--accent)'; seal.style.borderColor = 'var(--accent)'; }
  else { seal.textContent = '要復習'; seal.style.color = 'var(--ink-soft)'; seal.style.borderColor = 'var(--ink-soft)'; }
  showScreen('complete');
}

function retryWrong() {
  if (session.wrongIds.length === 0) { alert('全問正解でした！'); return; }
  const qs = getCurrentData().questions.filter(q => session.wrongIds.includes(q.id));
  startQuiz(shuffle(qs));
}

// =================================
// 試験モード（択一式）
// =================================
function startExam(subjectId) {
  const exams = getCurrentData().exams.filter(e => e.subject === subjectId);
  if (exams.length === 0) return;
  examSession = {
    subjectId,
    subjectName: SUBJECTS.find(s => s.id === subjectId).name,
    questions: exams,
    index: 0,
    answers: {},
    flags: new Set(),
    startTime: Date.now(),
    submitted: false,
    reviewing: false
  };
  showScreen('exam');
  startExamTimer();
  renderExamQuestion();
}

function startExamTimer() {
  const el = document.getElementById('examTimer');
  const update = () => {
    const elapsed = Math.floor((Date.now() - examSession.startTime) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    el.textContent = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };
  update();
  if (examTimerInterval) clearInterval(examTimerInterval);
  examTimerInterval = setInterval(update, 1000);
}

function renderExamQuestion() {
  const q = examSession.questions[examSession.index];
  const selected = examSession.answers[q.id];
  const flagged = examSession.flags.has(q.id);

  const flagBtn = document.getElementById('examFlagBtn');
  if (flagged) { flagBtn.classList.add('active'); flagBtn.textContent = '▲'; }
  else { flagBtn.classList.remove('active'); flagBtn.textContent = '△'; }

  document.getElementById('examProgressBtn').textContent = `${examSession.index + 1} / ${examSession.questions.length}`;

  const body = document.getElementById('examBody');
  body.innerHTML = `
    <div class="exam-q-title mincho">${q.year}年度 ${q.subjectName} ${q.qNumber}</div>
    <div class="exam-q-instruction mincho">${q.instruction.replace(/\n/g, '<br>')}</div>
    <div class="choice-list">
      ${q.choices.map(c => `
        <button class="choice-item ${selected === c.label ? 'selected' : ''}" onclick="selectChoice('${c.label}')">
          <span class="choice-label">${c.label}</span>${c.text}
        </button>
      `).join('')}
    </div>
    <div class="exam-nav">
      <button class="exam-nav-btn" onclick="examPrev()" ${examSession.index === 0 ? 'disabled' : ''}>← 前の問題</button>
      <button class="exam-nav-btn primary" onclick="examNext()" ${examSession.index === examSession.questions.length - 1 ? 'disabled' : ''}>次の問題 →</button>
    </div>
  `;
  body.scrollTo(0, 0);
  document.getElementById('examSubmitBtn').classList.add('show');
}

function selectChoice(label) {
  const q = examSession.questions[examSession.index];
  examSession.answers[q.id] = label;
  document.querySelectorAll('#exam .choice-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  if (navigator.vibrate) navigator.vibrate(10);
}

function toggleExamFlag() {
  const q = examSession.questions[examSession.index];
  if (examSession.flags.has(q.id)) examSession.flags.delete(q.id);
  else examSession.flags.add(q.id);
  const flagBtn = document.getElementById('examFlagBtn');
  if (examSession.flags.has(q.id)) { flagBtn.classList.add('active'); flagBtn.textContent = '▲'; }
  else { flagBtn.classList.remove('active'); flagBtn.textContent = '△'; }
}

function examPrev() { if (examSession.index > 0) { examSession.index--; renderExamQuestion(); } }
function examNext() { if (examSession.index < examSession.questions.length - 1) { examSession.index++; renderExamQuestion(); } }

function openExamOverview() {
  const grid = document.getElementById('examGrid');
  grid.innerHTML = examSession.questions.map((q, i) => {
    const answered = examSession.answers[q.id] !== undefined;
    const flagged = examSession.flags.has(q.id);
    const current = i === examSession.index;
    return `<div class="q-cell ${answered ? 'answered' : ''} ${flagged ? 'flagged' : ''} ${current ? 'current' : ''}" onclick="jumpToQuestion(${i})">${i + 1}</div>`;
  }).join('');
  document.getElementById('examOverlay').classList.add('show');
}
function closeExamOverview(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('examOverlay').classList.remove('show');
}
function jumpToQuestion(idx) { examSession.index = idx; closeExamOverview(); renderExamQuestion(); }

function confirmExitExam() {
  if (examSession && examSession.submitted && examSession.reviewing) { backToExamResult(); return; }
  if (!examSession) { goHome(); return; }
  const answered = Object.keys(examSession.answers).length;
  if (answered === 0 || examSession.submitted) { goHome(); return; }
  if (confirm('試験を中断してホームに戻りますか？\n解答内容は保存されません。')) goHome();
}

function confirmSubmitExam() {
  const answered = Object.keys(examSession.answers).length;
  const total = examSession.questions.length;
  const unanswered = total - answered;
  let msg = unanswered > 0 ? `未解答が ${unanswered} 問あります。このまま採点しますか？` : '採点を開始します。よろしいですか？';
  if (confirm(msg)) submitExam();
}

function submitExam() {
  examSession.submitted = true;
  clearInterval(examTimerInterval);
  examTimerInterval = null;
  let correct = 0;
  examSession.questions.forEach(q => {
    const userAns = examSession.answers[q.id];
    // 複数正解対応：correctLabelが"C"のみだが、choicesでcorrect:trueのものも考慮
    const correctLabels = q.choices.filter(c => c.correct).map(c => c.label);
    if (correctLabels.includes(userAns)) correct++;
  });
  const duration = Math.floor((Date.now() - examSession.startTime) / 1000);
  state.examHistory.push({ subjectId: examSession.subjectId, year: state.currentYear, date: Date.now(), score: correct, total: examSession.questions.length, duration });
  saveState();
  renderExamResult(correct, duration);
  showScreen('examResult');
  document.getElementById('examResultSub').textContent = 'EXAM RESULT';
}

function renderExamResult(correct, duration) {
  const total = examSession.questions.length;
  const rate = Math.round((correct / total) * 100);
  const passRate = Math.ceil(total * 0.4);
  const passed = correct >= passRate;
  const hours = Math.floor(duration / 3600);
  const mins = Math.floor((duration % 3600) / 60);
  const secs = duration % 60;
  const timeStr = hours > 0 ? `${hours}時間${mins}分${secs}秒` : `${mins}分${secs}秒`;
  let sealChar, sealColor;
  if (rate >= 80) { sealChar = '優秀'; sealColor = 'var(--correct)'; }
  else if (passed) { sealChar = '合格'; sealColor = 'var(--accent)'; }
  else { sealChar = '要復習'; sealColor = 'var(--ink-soft)'; }

  document.getElementById('examResultBody').innerHTML = `
    <div class="complete-seal mincho" style="color:${sealColor};border-color:${sealColor}">${sealChar}</div>
    <div class="complete-title mincho">${examSession.subjectName}</div>
    <div class="complete-score mincho">${correct}<small> / ${total}</small></div>
    <div class="complete-detail">正答率 ${rate}%（合格基準 ${passRate}点以上）</div>
    <div class="complete-time mincho">所要時間 ${timeStr}</div>
    <div class="result-table">
      <div class="result-row header"><div class="rq">問題</div><div class="rans">解答／正解</div><div>状態</div><div class="rcor">判定</div></div>
      ${examSession.questions.map(q => {
        const a = examSession.answers[q.id];
        const correctLabels = q.choices.filter(c => c.correct).map(c => c.label);
        const isCorrect = correctLabels.includes(a);
        const skipped = !a;
        const correctDisplay = correctLabels.length > 1 ? correctLabels.join('/') : correctLabels[0];
        return `
          <div class="result-row clickable" onclick="showExamDetail('${q.id}')">
            <div class="rq">${q.qNumber}</div>
            <div class="rans">${a || '—'} / <span style="color:var(--accent)">${correctDisplay}</span></div>
            <div style="font-size:11px;color:var(--ink-soft)">タップで解説</div>
            <div class="rcor ${skipped ? 'skip' : (isCorrect ? 'ok' : 'ng')}">${skipped ? '—' : (isCorrect ? '○' : '×')}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="complete-actions">
      <button class="complete-btn" onclick="goHome()">ホームへ戻る</button>
      <button class="complete-btn secondary" onclick="retryExam()">もう一度挑戦</button>
    </div>
  `;
}

function showExamDetail(qid) {
  const q = examSession.questions.find(x => x.id === qid);
  if (!q) return;
  examSession.reviewing = true;
  const userAns = examSession.answers[q.id];
  const correctLabels = q.choices.filter(c => c.correct).map(c => c.label);
  const isCorrect = correctLabels.includes(userAns);
  showScreen('exam');
  const body = document.getElementById('examBody');
  body.innerHTML = `
    <div class="exam-q-title mincho">${q.year}年度 ${q.subjectName} ${q.qNumber} ・ 解説</div>
    <div class="exam-q-instruction mincho">${q.instruction.replace(/\n/g, '<br>')}</div>
    <div style="margin-bottom:14px;padding:10px 14px;background:${isCorrect?'#eaf0ea':(userAns?'#f0e8e8':'var(--paper)')};border:1px solid ${isCorrect?'var(--correct)':(userAns?'var(--wrong)':'var(--line)')};font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:0.05em">
      あなたの解答: <strong>${userAns || '未解答'}</strong> ／ 正解: <strong style="color:var(--accent)">${correctLabels.join(' または ')}</strong>
      ${userAns ? ` <span style="float:right;color:${isCorrect?'var(--correct)':'var(--wrong)'}">${isCorrect?'○ 正解':'× 不正解'}</span>` : ''}
    </div>
    <div class="choice-list">
      ${q.choices.map(c => {
        let cls = '';
        if (correctLabels.includes(c.label)) cls = 'correct-answer';
        else if (c.label === userAns) cls = 'wrong-selected';
        return `
          <div class="choice-item ${cls}">
            <span class="choice-label">${c.label}</span>${c.text}
            <div class="choice-explain show">${c.explain || ''}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);font-family:'Shippori Mincho',serif;font-size:12px;color:var(--accent);letter-spacing:0.05em">§ ${q.reference}</div>
    <div class="exam-nav" style="margin-top:20px"><button class="exam-nav-btn" onclick="backToExamResult()">← 結果に戻る</button></div>
  `;
  document.getElementById('examSubmitBtn').classList.remove('show');
  document.getElementById('examFlagBtn').style.display = 'none';
  document.getElementById('examProgressBtn').style.display = 'none';
  if (examTimerInterval) { clearInterval(examTimerInterval); examTimerInterval = null; }
  document.getElementById('examTimer').textContent = '解説';
  document.getElementById('examTimer').style.fontSize = '14px';
  body.scrollTo(0, 0);
}

function backToExamResult() {
  if (examSession) examSession.reviewing = false;
  document.getElementById('examFlagBtn').style.display = '';
  document.getElementById('examProgressBtn').style.display = '';
  document.getElementById('examTimer').style.fontSize = '';
  showScreen('examResult');
}

function retryExam() {
  document.getElementById('examFlagBtn').style.display = '';
  document.getElementById('examProgressBtn').style.display = '';
  document.getElementById('examTimer').style.fontSize = '';
  startExam(examSession.subjectId);
}

// 選択式モード
// =================================
function startSentaku(subjectId) {
  const items = getCurrentData().sentaku.filter(s => s.subject === subjectId);
  if (items.length === 0) return;
  sentakuSession = {
    subjectId,
    subjectName: SUBJECTS.find(s => s.id === subjectId).name,
    item: items[0], // 1科目につき1セット
    answers: {},    // { label: choiceNum }
    startTime: Date.now(),
    submitted: false,
    reviewing: false
  };
  activeBlankLabel = null;
  showScreen('sentaku');
  startSentakuTimer();
  renderSentaku();
}

function startSentakuTimer() {
  const el = document.getElementById('sentakuTimer');
  const update = () => {
    const elapsed = Math.floor((Date.now() - sentakuSession.startTime) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    el.textContent = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };
  update();
  if (sentakuTimerInterval) clearInterval(sentakuTimerInterval);
  sentakuTimerInterval = setInterval(update, 1000);
}

function renderSentaku() {
  const s = sentakuSession;
  const item = s.item;
  const answers = s.answers;
  const body = document.getElementById('sentakuBody');

  // 本文をレンダリング（空欄を置換）
  const renderPassage = (text) => {
    return text.replace(/\{([A-E])\}/g, (match, label) => {
      const filled = answers[label] !== undefined;
      const active = activeBlankLabel === label && !s.submitted;
      let cls = 'blank-slot';
      if (filled) cls += ' filled';
      if (active) cls += ' active';
      if (s.submitted) {
        const blank = item.blanks.find(b => b.label === label);
        if (answers[label] === blank.correct) cls += ' correct';
        else cls += ' wrong';
      }
      let content;
      if (filled) {
        const cn = answers[label];
        // 雇用のgroup対応と労災を区別
        const choice = item.choices.find(c => c.num === cn && (!c.group || c.group === label));
        content = choice ? choice.text : `(${cn})`;
      } else {
        content = '　';
      }
      return `<span class="${cls}" onclick="selectBlank('${label}')"><span class="blank-label">${label}</span>${content}</span>`;
    });
  };

  const passagesHtml = item.passages.map(p => `
    <div style="margin-bottom: 14px;">
      <div style="font-family:'Shippori Mincho',serif;font-size:13px;color:var(--accent);letter-spacing:0.1em;margin-bottom:4px;">${p.title}</div>
      <div>${renderPassage(p.text)}</div>
    </div>
  `).join('');

  // 採点済のときは選択肢を非表示、解説を表示
  let choicesHtml = '';
  if (!s.submitted) {
    // 雇用保険の場合はgroupで絞る、労災の場合は全選択肢から
    let shownChoices = item.choices;
    if (activeBlankLabel && item.choices.some(c => c.group)) {
      shownChoices = item.choices.filter(c => c.group === activeBlankLabel);
    }
    // 既に使用されている選択肢（同じ群内）を判定
    const usedNums = Object.entries(answers)
      .filter(([l, _]) => l !== activeBlankLabel)
      .map(([_, n]) => n);
    choicesHtml = `
      <div class="sentaku-choices-wrap">
        <div class="sentaku-choices-label">
          <span>${activeBlankLabel ? `空欄 ${activeBlankLabel} の選択肢` : '空欄をタップして選択肢を選んでください'}</span>
          ${activeBlankLabel && answers[activeBlankLabel] !== undefined ? `<button onclick="clearBlank()" style="background:none;border:none;color:var(--accent);font-size:10px;cursor:pointer">クリア</button>` : ''}
        </div>
        <div class="sentaku-choices">
          ${activeBlankLabel ? shownChoices.map(c => {
            const used = usedNums.includes(c.num) && (!c.group); // groupあり(雇用)なら重複OK
            return `
              <button class="sentaku-choice ${used ? 'used' : ''}" ${used ? 'disabled' : ''} onclick="pickChoice(${c.num})">
                <span class="sc-num">${c.num}</span>${c.text}
              </button>
            `;
          }).join('') : '<div style="padding: 10px 22px; font-size: 11.5px; color: var(--ink-faint);">文中の空欄（A〜E）をタップしてください</div>'}
        </div>
      </div>
    `;
  }

  let instructionInfo = `
    <div class="exam-q-title mincho">${item.year}年度 ${item.subjectName} 選択式 ${item.qNumber}</div>
    <div style="font-size:11px;color:var(--ink-faint);letter-spacing:0.1em;margin-bottom:14px;">文中の【A】〜【E】を選択肢から埋めて完全な文章としなさい。</div>
  `;

  body.innerHTML = instructionInfo + `<div class="sentaku-text">${passagesHtml}</div>` + choicesHtml;

  // 未採点時のみ採点ボタン表示
  if (!s.submitted) document.getElementById('sentakuSubmitBtn').classList.add('show');
  else document.getElementById('sentakuSubmitBtn').classList.remove('show');
}

function selectBlank(label) {
  if (sentakuSession.submitted) return;
  activeBlankLabel = (activeBlankLabel === label) ? null : label;
  renderSentaku();
}

function pickChoice(num) {
  if (!activeBlankLabel) return;
  sentakuSession.answers[activeBlankLabel] = num;
  // 自動的に次の空欄へ
  const order = ['A','B','C','D','E'];
  const nextLabel = order.find(l => l !== activeBlankLabel && sentakuSession.answers[l] === undefined);
  activeBlankLabel = nextLabel || null;
  renderSentaku();
}

function clearBlank() {
  if (!activeBlankLabel) return;
  delete sentakuSession.answers[activeBlankLabel];
  renderSentaku();
}

function openSentakuOverview() {
  const grid = document.getElementById('sentakuGrid');
  const labels = ['A','B','C','D','E'];
  grid.innerHTML = labels.map(l => {
    const answered = sentakuSession.answers[l] !== undefined;
    const current = activeBlankLabel === l;
    return `<div class="q-cell ${answered ? 'answered' : ''} ${current ? 'current' : ''}" onclick="jumpSentaku('${l}')">${l}</div>`;
  }).join('');
  document.getElementById('sentakuOverlay').classList.add('show');
}
function closeSentakuOverview(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('sentakuOverlay').classList.remove('show');
}
function jumpSentaku(label) {
  activeBlankLabel = label;
  closeSentakuOverview();
  renderSentaku();
}

function confirmExitSentaku() {
  if (sentakuSession && sentakuSession.submitted) { goHome(); return; }
  if (!sentakuSession) { goHome(); return; }
  const answered = Object.keys(sentakuSession.answers).length;
  if (answered === 0) { goHome(); return; }
  if (confirm('選択式を中断してホームに戻りますか？\n解答内容は保存されません。')) goHome();
}

function confirmSubmitSentaku() {
  const answered = Object.keys(sentakuSession.answers).length;
  const unanswered = 5 - answered;
  let msg = unanswered > 0 ? `未解答が ${unanswered} 空欄あります。このまま採点しますか？` : '採点を開始します。よろしいですか？';
  if (confirm(msg)) submitSentaku();
}

function submitSentaku() {
  sentakuSession.submitted = true;
  clearInterval(sentakuTimerInterval);
  sentakuTimerInterval = null;
  const item = sentakuSession.item;
  let correct = 0;
  item.blanks.forEach(b => {
    if (sentakuSession.answers[b.label] === b.correct) correct++;
  });
  const duration = Math.floor((Date.now() - sentakuSession.startTime) / 1000);
  state.sentakuHistory.push({ subjectId: sentakuSession.subjectId, year: state.currentYear, date: Date.now(), score: correct, total: 5, duration });
  saveState();
  activeBlankLabel = null;
  renderSentakuResult(correct, duration);
  showScreen('examResult');
  document.getElementById('examResultSub').textContent = 'SENTAKU RESULT';
}

function renderSentakuResult(correct, duration) {
  const item = sentakuSession.item;
  const rate = Math.round((correct / 5) * 100);
  const passed = correct >= 3;
  const hours = Math.floor(duration / 3600);
  const mins = Math.floor((duration % 3600) / 60);
  const secs = duration % 60;
  const timeStr = hours > 0 ? `${hours}時間${mins}分${secs}秒` : `${mins}分${secs}秒`;
  let sealChar, sealColor;
  if (correct === 5) { sealChar = '満点'; sealColor = 'var(--correct)'; }
  else if (passed) { sealChar = '合格'; sealColor = 'var(--accent)'; }
  else { sealChar = '要復習'; sealColor = 'var(--ink-soft)'; }

  document.getElementById('examResultBody').innerHTML = `
    <div class="complete-seal mincho" style="color:${sealColor};border-color:${sealColor}">${sealChar}</div>
    <div class="complete-title mincho">${sentakuSession.subjectName} 選択式</div>
    <div class="complete-score mincho">${correct}<small> / 5</small></div>
    <div class="complete-detail">正答率 ${rate}%（合格基準 3点以上）</div>
    <div class="complete-time mincho">所要時間 ${timeStr}</div>
    <div class="result-table">
      <div class="result-row header"><div class="rq">空欄</div><div class="rans">解答／正解</div><div>解説</div><div class="rcor">判定</div></div>
      ${item.blanks.map(b => {
        const userNum = sentakuSession.answers[b.label];
        const userChoice = item.choices.find(c => c.num === userNum && (!c.group || c.group === b.label));
        const correctChoice = item.choices.find(c => c.num === b.correct && (!c.group || c.group === b.label));
        const isCorrect = userNum === b.correct;
        const skipped = userNum === undefined;
        return `
          <div class="result-row" style="grid-template-columns: 42px 1fr 32px;">
            <div class="rq">${b.label}</div>
            <div style="font-size:11.5px;">
              <div style="color:var(--ink-soft)">解答: ${skipped ? '未解答' : (userChoice ? userChoice.text : '-')}</div>
              <div style="color:var(--accent);font-weight:500;margin-top:2px;">正解: ${correctChoice ? correctChoice.text : '-'}</div>
              <div style="color:var(--ink-soft);margin-top:6px;font-size:11px;line-height:1.6;">${b.explain}</div>
            </div>
            <div class="rcor ${skipped ? 'skip' : (isCorrect ? 'ok' : 'ng')}">${skipped ? '—' : (isCorrect ? '○' : '×')}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div style="margin:0 0 20px;padding:10px 14px;border:1px dashed var(--line);font-family:'Shippori Mincho',serif;font-size:12px;color:var(--accent);letter-spacing:0.05em;">§ ${item.reference}</div>
    <div class="complete-actions">
      <button class="complete-btn" onclick="goHome()">ホームへ戻る</button>
      <button class="complete-btn secondary" onclick="startSentaku('${sentakuSession.subjectId}')">もう一度挑戦</button>
    </div>
  `;
}

// Init
loadState();
renderHome();
</script>
</body>
</html>
